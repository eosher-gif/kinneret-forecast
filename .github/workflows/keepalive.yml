name: keepalive
on:
  schedule:
    - cron: "0 12 1 * *"  # 1st of every month
permissions:
  contents: write
jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: prevent GitHub from disabling cron"
          git push
